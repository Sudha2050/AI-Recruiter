ai_usage_summary: |
  Used Claude for architecture design, code review, and debugging.
  Used Copilot for autocomplete and boilerplate generation.
  No candidate data was sent to any LLM.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  4-stage cascade ranker:
  1. Bi-Encoder semantic dense retrieval (top 2000)
  2. Cross-Encoder (TinyBERT) semantic re-ranking (top 300)
  3. Structured scoring: title, company, experience, skills, education
  4. Behavioral multiplier (14 signals) + honeypot penalty.
  Final score = (0.4*semantic + 0.6*structured) × behavioral × honeypot.
  Scores scaled to 0–100. Runtime ~30 seconds on CPU.

