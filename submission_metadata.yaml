ai_usage_summary: |
  Used Claude for architecture design, code review, and debugging.
  Used Copilot for autocomplete and boilerplate generation.
  No candidate data was sent to any LLM.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  3-stage cascade ranker:
  1. BM25 coarse filtering to select top 2000 candidates.
  2. Dual Bi-Encoder Ensemble semantic scoring using all-MiniLM-L6-v2 (averaging General and Skill-only representation cosine similarities) to select top 300 candidates.
  3. Structured scoring (title, company tier, experience, skills, education) + Behavioral multiplier (14 signals) + Honeypot penalty.
  Final score = (0.55*semantic + 0.45*structured) × behavioral × honeypot.
  Scores scaled to 0–100. Runtime ~15 seconds on CPU.

